{% extends "base.html" %}
{% block title %}账号注册{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5 col-md-7">
        <div class="card card-beauty">
            <div class="card-header text-center">
                <h4 class="mb-0"><i class="fa fa-user-plus me-2"></i>新用户注册</h4>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    <div class="mb-3">
                        <label class="form-label"><i class="fa fa-user text-primary"></i> 设置用户名</label>
                        <input type="text" name="username" class="form-control" placeholder="不可重复" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label"><i class="fa fa-lock text-primary"></i> 设置密码</label>
                        <input type="password" name="password" class="form-control" placeholder="自定义密码" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100 btn-lg">
                        <i class="fa fa-plus-circle"></i> 完成注册
                    </button>
                </form>
                <div class="text-center mt-4 text-secondary">
                    已有账号？<a href="{{url_for('login')}}" class="text-primary">返回登录</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
